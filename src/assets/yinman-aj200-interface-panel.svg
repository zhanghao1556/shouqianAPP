<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 168" role="img" aria-label="双麦处理器接口面板工程图">
  <style>
    .body{fill:#f8fafc;stroke:#172033;stroke-width:2}.bank{fill:#bbf7d0;stroke:#047857;stroke-width:1.5}.port{fill:#eff6ff;stroke:#2563eb;stroke-width:1.5}.hole{fill:#172033}.label{fill:#172033;font:700 8px Arial,"Microsoft YaHei",sans-serif;letter-spacing:0;text-anchor:middle}.small{fill:#475569;font:700 7px Arial,"Microsoft YaHei",sans-serif;letter-spacing:0;text-anchor:middle}
  </style>
  <rect class="body" x="1" y="1" width="748" height="166" rx="18"/>
  <g aria-label="SPK1 SPK2">
    <rect class="bank" x="20" y="42" width="77" height="55" rx="5"/>
    <text class="label" x="58" y="34">SPK 1 / 2</text>
    <rect class="hole" x="31" y="65" width="8" height="12" rx="1"/><rect class="hole" x="44" y="65" width="8" height="12" rx="1"/>
    <rect class="hole" x="55" y="65" width="8" height="12" rx="1"/><rect class="hole" x="68" y="65" width="8" height="12" rx="1"/>
    <text class="small" x="41" y="112">+ -</text><text class="small" x="65" y="112">+ -</text>
  </g>
  <g aria-label="MIC1 MIC2">
    <rect class="bank" x="106" y="35" width="42" height="98" rx="5"/>
    <text class="label" x="127" y="25">MIC</text>
    <rect class="hole" x="113" y="47" width="8" height="13" rx="1"/><rect class="hole" x="123" y="47" width="8" height="13" rx="1"/><rect class="hole" x="133" y="47" width="8" height="13" rx="1"/>
    <rect class="hole" x="113" y="104" width="8" height="13" rx="1"/><rect class="hole" x="123" y="104" width="8" height="13" rx="1"/><rect class="hole" x="133" y="104" width="8" height="13" rx="1"/>
    <text class="small" x="127" y="72">1</text><text class="small" x="127" y="128">2</text>
  </g>
  <g aria-label="LINE IN 1 LINE IN 2">
    <rect class="bank" x="166" y="35" width="42" height="98" rx="5"/>
    <text class="label" x="187" y="25">LINE IN</text>
    <rect class="hole" x="173" y="47" width="8" height="13" rx="1"/><rect class="hole" x="183" y="47" width="8" height="13" rx="1"/><rect class="hole" x="193" y="47" width="8" height="13" rx="1"/>
    <rect class="hole" x="173" y="104" width="8" height="13" rx="1"/><rect class="hole" x="183" y="104" width="8" height="13" rx="1"/><rect class="hole" x="193" y="104" width="8" height="13" rx="1"/>
    <text class="small" x="187" y="72">1</text><text class="small" x="187" y="128">2</text>
  </g>
  <g aria-label="LINE OUT 1 LINE OUT 2">
    <rect class="bank" x="224" y="35" width="42" height="98" rx="5"/>
    <text class="label" x="245" y="25">LINE OUT</text>
    <rect class="hole" x="231" y="47" width="8" height="13" rx="1"/><rect class="hole" x="241" y="47" width="8" height="13" rx="1"/><rect class="hole" x="251" y="47" width="8" height="13" rx="1"/>
    <rect class="hole" x="231" y="104" width="8" height="13" rx="1"/><rect class="hole" x="241" y="104" width="8" height="13" rx="1"/><rect class="hole" x="251" y="104" width="8" height="13" rx="1"/>
    <text class="small" x="245" y="72">1</text><text class="small" x="245" y="128">2</text>
  </g>
  <g aria-label="HP IN HP OUT">
    <circle class="port" cx="294" cy="84" r="13"/><circle class="hole" cx="294" cy="84" r="5"/><text class="small" x="294" y="112">HP IN</text>
    <circle class="port" cx="330" cy="84" r="13"/><circle class="hole" cx="330" cy="84" r="5"/><text class="small" x="330" y="112">HP OUT</text>
  </g>
  <g aria-label="EXTMIC"><rect class="port" x="365" y="56" width="46" height="46" rx="5"/><path class="hole" d="M374 68h28v20h-5v7h-18v-7h-5z"/><text class="label" x="388" y="118">EXTMIC</text></g>
  <g aria-label="LAN"><rect class="port" x="429" y="56" width="46" height="46" rx="5"/><path class="hole" d="M438 68h28v20h-5v7h-18v-7h-5z"/><text class="label" x="452" y="118">LAN</text></g>
  <g aria-label="USB"><rect class="port" x="489" y="62" width="40" height="38" rx="5"/><rect class="hole" x="498" y="69" width="22" height="24" rx="3"/><text class="label" x="509" y="118">USB</text></g>
  <g aria-label="RS232 RX TX GND"><rect class="bank" x="606" y="62" width="47" height="36" rx="4"/><rect class="hole" x="615" y="72" width="8" height="13" rx="1"/><rect class="hole" x="625" y="72" width="8" height="13" rx="1"/><rect class="hole" x="635" y="72" width="8" height="13" rx="1"/><text class="small" x="619" y="95">RX</text><text class="small" x="629" y="95">TX</text><text class="small" x="639" y="95">G</text><text class="label" x="629" y="118">RS232</text></g>
  <circle class="hole" cx="694" cy="84" r="6"/><text class="small" x="694" y="112">PWR</text>
</svg>

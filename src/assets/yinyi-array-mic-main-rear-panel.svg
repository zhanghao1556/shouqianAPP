<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="智能天花阵列麦克风主麦背面接口工程图">
  <style>
    .body{fill:#f8fafc;stroke:#172033;stroke-width:4}.rail{fill:#e2e8f0;stroke:#64748b;stroke-width:2}.label{fill:#172033;font:700 18px Arial,"Microsoft YaHei",sans-serif;letter-spacing:0;text-anchor:middle}.small{fill:#475569;font:700 13px Arial,"Microsoft YaHei",sans-serif;letter-spacing:0;text-anchor:middle}.tiny{fill:#475569;font:700 11px Arial,"Microsoft YaHei",sans-serif;letter-spacing:0;text-anchor:middle}.rj45{fill:#dbeafe;stroke:#1d4ed8;stroke-width:3}.usb{fill:#ede9fe;stroke:#6d28d9;stroke-width:3}.phoenix{fill:#bbf7d0;stroke:#047857;stroke-width:3}.spk{fill:#dcfce7;stroke:#15803d;stroke-width:3}.hole{fill:#172033}.power{fill:#fee2e2;stroke:#b91c1c;stroke-width:3}.switch{fill:#fef3c7;stroke:#a16207;stroke-width:3}.active{fill:#dc2626}.inactive{fill:#cbd5e1}
  </style>
  <rect class="body" x="2" y="2" width="1276" height="316" rx="8"/>
  <rect class="rail" x="18" y="58" width="1244" height="174" rx="6"/>

  <g aria-label="POWER IN">
    <circle class="power" cx="77" cy="146" r="30"/><circle class="hole" cx="77" cy="146" r="12"/>
    <text class="label" x="77" y="95">POWER IN</text><text class="small" x="77" y="204">主麦供电</text>
  </g>

  <g aria-label="EXT MIC OUT">
    <rect class="rj45" x="182" y="112" width="80" height="68" rx="5"/><rect class="hole" x="196" y="124" width="52" height="42" rx="4"/>
    <path d="M202 128v34M209 128v34M216 128v34M223 128v34M230 128v34M237 128v34M244 128v34" stroke="#93c5fd" stroke-width="2"/>
    <text class="label" x="222" y="95">EXT MIC OUT</text><text class="small" x="222" y="204">中控 / 上一级</text>
  </g>

  <g aria-label="EXT MIC IN">
    <rect class="rj45" x="314" y="112" width="80" height="68" rx="5"/><rect class="hole" x="328" y="124" width="52" height="42" rx="4"/>
    <path d="M334 128v34M341 128v34M348 128v34M355 128v34M362 128v34M369 128v34M376 128v34" stroke="#93c5fd" stroke-width="2"/>
    <text class="label" x="354" y="95">EXT MIC IN</text><text class="small" x="354" y="204">下一级从麦</text>
  </g>

  <g aria-label="USB-B">
    <path class="usb" d="M442 112h68l10 12v44l-10 12h-68l-10-12v-44z"/><rect class="hole" x="450" y="128" width="52" height="36" rx="4"/>
    <text class="label" x="476" y="95">USB</text><text class="small" x="476" y="204">USB-B 音频 / 调试</text>
  </g>

  <g aria-label="M S 主从拨码（左M右S）" data-switch-layout="left-m-right-s" data-selected-mode="M">
    <rect class="switch" x="526" y="118" width="84" height="56" rx="7"/><rect class="active" x="534" y="126" width="32" height="40" rx="4"/><rect class="inactive" x="570" y="126" width="32" height="40" rx="4"/>
    <text class="label" x="568" y="95">M / S</text><text class="tiny" x="550" y="151" fill="#fff">M</text><text class="tiny" x="586" y="151">S</text><text class="small" x="568" y="204">主麦：M</text>
  </g>

  <g aria-label="LINE OUT 六位凤凰端子">
    <rect class="phoenix" x="622" y="108" width="194" height="84" rx="6"/>
    <text class="label" x="719" y="95">LINE OUT</text>
    <circle class="hole" cx="650" cy="146" r="9"/><circle class="hole" cx="678" cy="146" r="9"/><circle class="hole" cx="706" cy="146" r="9"/><circle class="hole" cx="738" cy="146" r="9"/><circle class="hole" cx="766" cy="146" r="9"/><circle class="hole" cx="794" cy="146" r="9"/>
    <text class="small" x="650" y="180">G</text><text class="small" x="678" y="180">L</text><text class="small" x="706" y="180">R</text><text class="small" x="738" y="180">G</text><text class="small" x="766" y="180">L</text><text class="small" x="794" y="180">R</text>
  </g>

  <g aria-label="LINE IN 六位凤凰端子">
    <rect class="phoenix" x="818" y="108" width="194" height="84" rx="6"/>
    <text class="label" x="915" y="95">LINE IN</text>
    <circle class="hole" cx="846" cy="146" r="9"/><circle class="hole" cx="874" cy="146" r="9"/><circle class="hole" cx="902" cy="146" r="9"/><circle class="hole" cx="934" cy="146" r="9"/><circle class="hole" cx="962" cy="146" r="9"/><circle class="hole" cx="990" cy="146" r="9"/>
    <text class="small" x="846" y="180">G</text><text class="small" x="874" y="180">L</text><text class="small" x="902" y="180">R</text><text class="small" x="934" y="180">G</text><text class="small" x="962" y="180">L</text><text class="small" x="990" y="180">R</text>
  </g>

  <g aria-label="SPK1 SPK2 SPK3 SPK4">
    <rect class="spk" x="1020" y="108" width="234" height="84" rx="6"/>
    <text class="label" x="1137" y="95">SPK 1 - 4</text>
    <circle class="active" cx="1046" cy="146" r="10"/><circle class="hole" cx="1072" cy="146" r="10"/><circle class="active" cx="1102" cy="146" r="10"/><circle class="hole" cx="1128" cy="146" r="10"/>
    <circle class="active" cx="1158" cy="146" r="10"/><circle class="hole" cx="1184" cy="146" r="10"/><circle class="active" cx="1214" cy="146" r="10"/><circle class="hole" cx="1240" cy="146" r="10"/>
    <text class="tiny" x="1046" y="179">1+</text><text class="tiny" x="1072" y="179">1-</text><text class="tiny" x="1102" y="179">2+</text><text class="tiny" x="1128" y="179">2-</text>
    <text class="tiny" x="1158" y="179">3+</text><text class="tiny" x="1184" y="179">3-</text><text class="tiny" x="1214" y="179">4+</text><text class="tiny" x="1240" y="179">4-</text>
  </g>

  <text class="small" x="817" y="266">每组 L、R 为两路独立信号，共用同组 G</text>
  <text class="small" x="1137" y="262">四路独立功放输出</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 250" role="img" aria-label="无线接收机背面接口工程图">
  <style>.body{fill:#f8fafc;stroke:#172033;stroke-width:4}.bank{fill:#bbf7d0;stroke:#047857;stroke-width:3}.port{fill:#eff6ff;stroke:#2563eb;stroke-width:3}.hole{fill:#172033}.accent{fill:#fef3c7;stroke:#a16207;stroke-width:3}.label{fill:#172033;font:700 15px Arial,"Microsoft YaHei",sans-serif;letter-spacing:0;text-anchor:middle}.small{fill:#475569;font:700 12px Arial,"Microsoft YaHei",sans-serif;letter-spacing:0;text-anchor:middle}</style>
  <rect class="body" x="2" y="2" width="996" height="246" rx="34"/>
  <g aria-label="RS232"><rect class="bank" x="50" y="88" width="60" height="52" rx="6"/><rect class="hole" x="63" y="103" width="10" height="18" rx="1"/><rect class="hole" x="76" y="103" width="10" height="18" rx="1"/><rect class="hole" x="89" y="103" width="10" height="18" rx="1"/><text class="label" x="80" y="170">RS232</text></g>
  <g aria-label="USB"><rect class="port" x="144" y="84" width="60" height="64" rx="8"/><rect class="hole" x="158" y="97" width="32" height="39" rx="5"/><text class="label" x="174" y="170">USB</text></g>
  <g aria-label="UHF"><path class="port" d="M254 78h54l16 34-16 34h-54l-16-34z"/><circle class="hole" cx="281" cy="112" r="17"/><text class="label" x="281" y="170">UHF</text></g>
  <g aria-label="BAL OUT"><rect class="bank" x="366" y="86" width="84" height="62" rx="7"/><rect class="hole" x="384" y="111" width="14" height="20" rx="2"/><rect class="hole" x="401" y="111" width="14" height="20" rx="2"/><rect class="hole" x="419" y="111" width="14" height="20" rx="2"/><text class="small" x="408" y="103">+  -  G</text><text class="label" x="408" y="170">BAL OUT</text></g>
  <g aria-label="LINE OUT"><circle class="port" cx="495" cy="120" r="22"/><circle class="hole" cx="495" cy="120" r="9"/><text class="label" x="495" y="170">LINE OUT</text></g>
  <g aria-label="MIC OUT"><circle class="accent" cx="586" cy="120" r="22"/><circle class="hole" cx="586" cy="120" r="9"/><text class="label" x="586" y="170">MIC OUT</text></g>
  <g aria-label="IR"><circle class="port" cx="665" cy="120" r="11"/><text class="small" x="665" y="170">IR</text></g>
  <g aria-label="2.4G"><path class="accent" d="M720 88h46l16 32-16 32h-46l-16-32z"/><circle class="hole" cx="743" cy="120" r="12"/><text class="label" x="743" y="178">2.4G</text></g>
  <g aria-label="DC"><circle class="port" cx="830" cy="120" r="22"/><circle class="hole" cx="830" cy="120" r="10"/><text class="label" x="830" y="170">DC 9V</text></g>
  <circle class="hole" cx="889" cy="120" r="7"/><text class="small" x="889" y="170">RST</text>
  <g aria-label="POWER"><rect class="port" x="930" y="70" width="42" height="92" rx="8"/><rect class="hole" x="944" y="84" width="14" height="64" rx="6"/><text class="small" x="951" y="184">ON/OFF</text></g>
</svg>

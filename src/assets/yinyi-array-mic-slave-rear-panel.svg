<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="智能天花阵列麦克风从麦背面接口工程图">
  <style>
    .body{fill:#f8fafc;stroke:#172033;stroke-width:4}.rail{fill:#e2e8f0;stroke:#64748b;stroke-width:2}.label{fill:#172033;font:700 18px Arial,"Microsoft YaHei",sans-serif;letter-spacing:0;text-anchor:middle}.small{fill:#475569;font:700 13px Arial,"Microsoft YaHei",sans-serif;letter-spacing:0;text-anchor:middle}.tiny{fill:#475569;font:700 11px Arial,"Microsoft YaHei",sans-serif;letter-spacing:0;text-anchor:middle}.rj45{fill:#dbeafe;stroke:#1d4ed8;stroke-width:3}.usb{fill:#ede9fe;stroke:#6d28d9;stroke-width:3}.phoenix{fill:#bbf7d0;stroke:#047857;stroke-width:3}.spk{fill:#dcfce7;stroke:#15803d;stroke-width:3}.hole{fill:#172033}.power{fill:#fee2e2;stroke:#b91c1c;stroke-width:3}.switch{fill:#fef3c7;stroke:#a16207;stroke-width:3}.selected{fill:#2563eb}.inactiveFill{fill:#cbd5e1}.disabled{opacity:.24}.slash{stroke:#b91c1c;stroke-width:8;stroke-linecap:round}
  </style>
  <rect class="body" x="2" y="2" width="1276" height="316" rx="8"/>
  <rect class="rail" x="18" y="58" width="1244" height="174" rx="6"/>

  <g class="disabled" aria-label="从麦不接本机电源">
    <circle class="power" cx="77" cy="146" r="30"/><circle class="hole" cx="77" cy="146" r="12"/><text class="label" x="77" y="95">POWER IN</text><path class="slash" d="M49 118l56 56"/>
  </g>

  <g aria-label="EXT MIC OUT 接上一级">
    <rect class="rj45" x="182" y="112" width="80" height="68" rx="5"/><rect class="hole" x="196" y="124" width="52" height="42" rx="4"/>
    <path d="M202 128v34M209 128v34M216 128v34M223 128v34M230 128v34M237 128v34M244 128v34" stroke="#93c5fd" stroke-width="2"/>
    <text class="label" x="222" y="95">EXT MIC OUT</text><text class="small" x="222" y="204">接主麦 / 上一级</text>
  </g>

  <g aria-label="EXT MIC IN 接下一级">
    <rect class="rj45" x="314" y="112" width="80" height="68" rx="5"/><rect class="hole" x="328" y="124" width="52" height="42" rx="4"/>
    <path d="M334 128v34M341 128v34M348 128v34M355 128v34M362 128v34M369 128v34M376 128v34" stroke="#93c5fd" stroke-width="2"/>
    <text class="label" x="354" y="95">EXT MIC IN</text><text class="small" x="354" y="204">接下一级从麦</text>
  </g>

  <g class="disabled" aria-label="从麦不使用USB">
    <path class="usb" d="M442 112h68l10 12v44l-10 12h-68l-10-12v-44z"/><rect class="hole" x="450" y="128" width="52" height="36" rx="4"/><text class="label" x="476" y="95">USB</text><path class="slash" d="M438 114l76 64"/>
  </g>

  <g aria-label="M S 主从拨码（左M右S）" data-switch-layout="left-m-right-s" data-selected-mode="S">
    <rect class="switch" x="526" y="118" width="84" height="56" rx="7"/><rect class="inactiveFill" x="534" y="126" width="32" height="40" rx="4"/><rect class="selected" x="570" y="126" width="32" height="40" rx="4"/>
    <text class="label" x="568" y="95">M / S</text><text class="tiny" x="550" y="151">M</text><text class="tiny" x="586" y="151" fill="#fff">S</text><text class="small" x="568" y="204">从麦：S</text>
  </g>

  <g class="disabled" aria-label="从麦不使用LINE OUT">
    <rect class="phoenix" x="622" y="108" width="194" height="84" rx="6"/><text class="label" x="719" y="95">LINE OUT</text>
    <circle class="hole" cx="650" cy="146" r="9"/><circle class="hole" cx="678" cy="146" r="9"/><circle class="hole" cx="706" cy="146" r="9"/><circle class="hole" cx="738" cy="146" r="9"/><circle class="hole" cx="766" cy="146" r="9"/><circle class="hole" cx="794" cy="146" r="9"/>
    <text class="tiny" x="650" y="177">G</text><text class="tiny" x="678" y="177">L</text><text class="tiny" x="706" y="177">R</text><text class="tiny" x="738" y="177">G</text><text class="tiny" x="766" y="177">L</text><text class="tiny" x="794" y="177">R</text><path class="slash" d="M636 116l166 62"/>
  </g>

  <g class="disabled" aria-label="从麦不使用LINE IN">
    <rect class="phoenix" x="818" y="108" width="194" height="84" rx="6"/><text class="label" x="915" y="95">LINE IN</text>
    <circle class="hole" cx="846" cy="146" r="9"/><circle class="hole" cx="874" cy="146" r="9"/><circle class="hole" cx="902" cy="146" r="9"/><circle class="hole" cx="934" cy="146" r="9"/><circle class="hole" cx="962" cy="146" r="9"/><circle class="hole" cx="990" cy="146" r="9"/>
    <text class="tiny" x="846" y="177">G</text><text class="tiny" x="874" y="177">L</text><text class="tiny" x="902" y="177">R</text><text class="tiny" x="934" y="177">G</text><text class="tiny" x="962" y="177">L</text><text class="tiny" x="990" y="177">R</text><path class="slash" d="M832 116l166 62"/>
  </g>

  <g class="disabled" aria-label="从麦不使用SPK">
    <rect class="spk" x="1020" y="108" width="234" height="84" rx="6"/><text class="label" x="1137" y="95">SPK 1 - 4</text>
    <circle class="hole" cx="1046" cy="146" r="10"/><circle class="hole" cx="1072" cy="146" r="10"/><circle class="hole" cx="1102" cy="146" r="10"/><circle class="hole" cx="1128" cy="146" r="10"/><circle class="hole" cx="1158" cy="146" r="10"/><circle class="hole" cx="1184" cy="146" r="10"/><circle class="hole" cx="1214" cy="146" r="10"/><circle class="hole" cx="1240" cy="146" r="10"/>
    <text class="tiny" x="1046" y="179">1+</text><text class="tiny" x="1072" y="179">1-</text><text class="tiny" x="1102" y="179">2+</text><text class="tiny" x="1128" y="179">2-</text><text class="tiny" x="1158" y="179">3+</text><text class="tiny" x="1184" y="179">3-</text><text class="tiny" x="1214" y="179">4+</text><text class="tiny" x="1240" y="179">4-</text><path class="slash" d="M1034 116l206 62"/>
  </g>

  <text class="small" x="640" y="266">从麦仅使用 EXT MIC OUT / IN 级联；由上一级供电，不连接其他外部设备</text>
</svg>

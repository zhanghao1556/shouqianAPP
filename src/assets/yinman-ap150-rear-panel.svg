<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="教学模拟功放主机接线区域工程图">
  <style>
    .body{fill:#f8fafc;stroke:#172033;stroke-width:4}.bank{fill:#bbf7d0;stroke:#047857;stroke-width:3}.hole{fill:#172033}.post{stroke-width:5}.positivePost{fill:#fee2e2;stroke:#b91c1c}.negativePost{fill:#f8fafc;stroke:#475569}.label{fill:#172033;font:700 22px Arial,"Microsoft YaHei",sans-serif;letter-spacing:0;text-anchor:middle}.small{fill:#475569;font:700 18px Arial,"Microsoft YaHei",sans-serif;letter-spacing:0;text-anchor:middle}
  </style>
  <rect class="body" x="2" y="2" width="1196" height="496" rx="24"/>
  <g aria-label="LINE IN 1 2 3 4">
    <rect class="bank" x="118" y="225" width="190" height="180" rx="10"/>
    <text class="label" x="213" y="203">LINE IN 1 - 4</text>
    <g><rect class="hole" x="154" y="285" width="12" height="18" rx="2"/><rect class="hole" x="178" y="285" width="12" height="18" rx="2"/><rect class="hole" x="202" y="285" width="12" height="18" rx="2"/></g>
    <g><rect class="hole" x="238" y="285" width="12" height="18" rx="2"/><rect class="hole" x="262" y="285" width="12" height="18" rx="2"/><rect class="hole" x="286" y="285" width="12" height="18" rx="2"/></g>
    <g><rect class="hole" x="154" y="365" width="12" height="18" rx="2"/><rect class="hole" x="178" y="365" width="12" height="18" rx="2"/><rect class="hole" x="202" y="365" width="12" height="18" rx="2"/></g>
    <g><rect class="hole" x="238" y="365" width="12" height="18" rx="2"/><rect class="hole" x="262" y="365" width="12" height="18" rx="2"/><rect class="hole" x="286" y="365" width="12" height="18" rx="2"/></g>
    <text class="small" x="184" y="326">1</text><text class="small" x="268" y="326">3</text><text class="small" x="184" y="427">2</text><text class="small" x="268" y="427">4</text>
    <text class="small" x="184" y="455">+   -   G</text><text class="small" x="268" y="455">+   -   G</text>
  </g>
  <g aria-label="SPK1 SPK2 SPK3 SPK4">
    <text class="label" x="516" y="58">SPK1</text><text class="label" x="668" y="58">SPK2</text><text class="label" x="822" y="58">SPK3</text><text class="label" x="974" y="58">SPK4</text>
    <circle class="post positivePost" cx="516" cy="128" r="43"/><circle class="hole" cx="516" cy="128" r="15"/>
    <circle class="post positivePost" cx="668" cy="128" r="43"/><circle class="hole" cx="668" cy="128" r="15"/>
    <circle class="post positivePost" cx="822" cy="128" r="43"/><circle class="hole" cx="822" cy="128" r="15"/>
    <circle class="post positivePost" cx="974" cy="128" r="43"/><circle class="hole" cx="974" cy="128" r="15"/>
    <circle class="post negativePost" cx="516" cy="316" r="43"/><circle class="hole" cx="516" cy="316" r="15"/>
    <circle class="post negativePost" cx="668" cy="316" r="43"/><circle class="hole" cx="668" cy="316" r="15"/>
    <circle class="post negativePost" cx="822" cy="316" r="43"/><circle class="hole" cx="822" cy="316" r="15"/>
    <circle class="post negativePost" cx="974" cy="316" r="43"/><circle class="hole" cx="974" cy="316" r="15"/>
    <text class="small" x="516" y="205">+</text><text class="small" x="668" y="205">+</text><text class="small" x="822" y="205">+</text><text class="small" x="974" y="205">+</text>
    <text class="small" x="516" y="397">-</text><text class="small" x="668" y="397">-</text><text class="small" x="822" y="397">-</text><text class="small" x="974" y="397">-</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="1000" height="300" role="img" aria-label="利旧双通道无线手持接收机背面接口工程图">
  <style>
    .body{fill:#f8fafc;stroke:#172033;stroke-width:5}
    .detail{fill:none;stroke:#64748b;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
    .antennaStem{fill:none;stroke:#172033;stroke-width:16;stroke-linecap:round;stroke-linejoin:round}
    .bncCollar{fill:#cbd5e1;stroke:#172033;stroke-width:4}
    .bncSocket{fill:#e2e8f0;stroke:#172033;stroke-width:5}
    .bncCore{fill:#172033;stroke:#94a3b8;stroke-width:3}
    .xlrShell{fill:#1f2937;stroke:#0f172a;stroke-width:5}
    .xlrInset{fill:#334155;stroke:#94a3b8;stroke-width:3}
    .xlrPin{fill:#d1d1d1;stroke:#ffffff;stroke-width:2}
    .lineOut{fill:#fef3c7;stroke:#a16207;stroke-width:5}
    .jackHole{fill:#111827;stroke:#000000;stroke-width:3}
    .label{fill:#172033;font:700 18px Arial,"Microsoft YaHei",sans-serif;letter-spacing:0;text-anchor:middle}
    .small{fill:#475569;font:700 13px Arial,"Microsoft YaHei",sans-serif;letter-spacing:0;text-anchor:middle}
    .pinNumber{fill:#ffffff;font:700 11px Arial,sans-serif;letter-spacing:0;text-anchor:middle}
  </style>

  <rect class="body" x="82" y="42" width="836" height="236" rx="18"/>
  <path class="detail" d="M112 70H888M112 250H888"/>
  <circle cx="112" cy="72" r="7" fill="#64748b"/>
  <circle cx="888" cy="72" r="7" fill="#64748b"/>
  <circle cx="112" cy="248" r="7" fill="#64748b"/>
  <circle cx="888" cy="248" r="7" fill="#64748b"/>

  <g aria-label="ANT A BNC接口直装竖直天线" data-bnc-interface="true" data-vertical-antenna="true">
    <path class="antennaStem" d="M46 18V124Q46 144 66 144H88"/>
    <rect class="bncCollar" x="84" y="130" width="30" height="28" rx="5"/>
    <path class="detail" d="M90 134V154M99 134V154M108 134V154"/>
    <circle class="bncSocket" cx="120" cy="144" r="25"/>
    <circle class="bncCore" cx="120" cy="144" r="12"/>
    <circle cx="120" cy="144" r="5" fill="#d1d1d1"/>
    <text class="small" x="122" y="224">ANT A / BNC</text>
  </g>

  <g aria-label="ANT B BNC接口直装竖直天线" data-bnc-interface="true" data-vertical-antenna="true">
    <path class="antennaStem" d="M954 18V124Q954 144 934 144H912"/>
    <rect class="bncCollar" x="886" y="130" width="30" height="28" rx="5"/>
    <path class="detail" d="M892 134V154M901 134V154M910 134V154"/>
    <circle class="bncSocket" cx="880" cy="144" r="25"/>
    <circle class="bncCore" cx="880" cy="144" r="12"/>
    <circle cx="880" cy="144" r="5" fill="#d1d1d1"/>
    <text class="small" x="878" y="224">ANT B / BNC</text>
  </g>

  <g aria-label="MIC OUT 1 卡侬公口">
    <circle class="xlrShell" cx="300" cy="144" r="58"/>
    <circle class="xlrInset" cx="300" cy="144" r="45"/>
    <circle id="legacy-mic-out-1-pin-2" data-male-pin="true" class="xlrPin" cx="281" cy="132" r="8"/>
    <circle id="legacy-mic-out-1-pin-3" data-male-pin="true" class="xlrPin" cx="319" cy="132" r="8"/>
    <circle id="legacy-mic-out-1-pin-1" data-male-pin="true" class="xlrPin" cx="300" cy="163" r="8"/>
    <text class="pinNumber" x="269" y="125">2</text>
    <text class="pinNumber" x="331" y="125">3</text>
    <text class="pinNumber" x="300" y="188">1</text>
    <text class="label" x="300" y="224">MIC OUT 1</text>
    <text class="small" x="300" y="246">手持 1</text>
  </g>

  <g aria-label="LINE OUT 6.35 大二芯接口">
    <circle class="lineOut" cx="500" cy="144" r="39"/>
    <circle class="jackHole" cx="500" cy="144" r="16"/>
    <circle cx="500" cy="144" r="7" fill="#475569"/>
    <text class="label" x="500" y="224">LINE OUT</text>
    <text class="small" x="500" y="246">6.35 / 手持 1+2</text>
  </g>

  <g aria-label="MIC OUT 2 卡侬公口">
    <circle class="xlrShell" cx="700" cy="144" r="58"/>
    <circle class="xlrInset" cx="700" cy="144" r="45"/>
    <circle id="legacy-mic-out-2-pin-2" data-male-pin="true" class="xlrPin" cx="681" cy="132" r="8"/>
    <circle id="legacy-mic-out-2-pin-3" data-male-pin="true" class="xlrPin" cx="719" cy="132" r="8"/>
    <circle id="legacy-mic-out-2-pin-1" data-male-pin="true" class="xlrPin" cx="700" cy="163" r="8"/>
    <text class="pinNumber" x="669" y="125">2</text>
    <text class="pinNumber" x="731" y="125">3</text>
    <text class="pinNumber" x="700" y="188">1</text>
    <text class="label" x="700" y="224">MIC OUT 2</text>
    <text class="small" x="700" y="246">手持 2</text>
  </g>
</svg>
